<!doctype html>
<html lang="en" data-bs-theme="auto">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="My homepage" />
    <title>Hiromasa Nakatsuka</title>
    <script>
      (function () {
        const t = localStorage.getItem('theme') || 'auto';
        document.documentElement.setAttribute('data-bs-theme',
          t === 'auto' ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light') : t);
      })();
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar site-navbar sticky-top" data-bs-theme="dark">
      <div class="container">
        <ul class="navbar-nav flex-row gap-4 mb-0">
          <li class="nav-item"><a class="nav-link" href="#about">About</a></li>
          <li class="nav-item"><a class="nav-link" href="#links">Links</a></li>
          <li class="nav-item"><a class="nav-link" href="#whatsnew">What's New</a></li>
        </ul>
        <button id="theme-toggle" class="btn btn-sm btn-outline-light rounded-2 px-2" aria-label="Toggle theme">
          <i id="theme-icon" class="bi bi-circle-half"></i>
        </button>
      </div>
    </nav>

    <main>
      <!-- About section -->
      <section id="about" class="py-5 bg-body-tertiary">
        <div class="container">
          <div class="row align-items-center justify-content-center g-4 g-md-5">
            <div class="col-12 col-md-auto text-center">
              <img
                src="assets/img/profile.jpg"
                alt="Profile photo"
                class="rounded-5"
                style="width:160px;height:160px;object-fit:cover"
              >
            </div>
            <div class="col-12 col-md text-center text-md-start">
              <h1 class="fw-bold mb-1">中塚洋佑</h1>
              <p class="fs-5 text-body-secondary mb-2">Hiromasa Nakatsuka</p>
              <div id="bio-container"></div>
            </div>
          </div>
        </div>
      </section>

      <!-- Links section -->
      <section id="links" class="py-4">
        <div class="container">
          <div class="d-flex flex-wrap justify-content-center gap-2" id="links-container"></div>
        </div>
      </section>

      <!-- What's New section -->
      <section id="whatsnew" class="py-5 bg-body-tertiary">
        <div class="container">
          <h2 class="text-center mb-4 fs-4 fw-bold">What's New</h2>
          <div class="row">
            <div class="col-12 col-sm-10 col-md-8 col-lg-5 mx-auto">
              <div class="card border shadow-sm">
                <div class="card-body px-3 py-0" id="whatsnew-container"></div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="py-3 text-center text-body-secondary border-top small">
      <p class="mb-0">&copy; 2026 Hiromasa Nakatsuka. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="assets/js/data.js"></script>
    <script>
      // Theme toggle
      (function () {
        const themes = ['auto', 'light', 'dark'];
        const icons = { auto: 'bi-circle-half', light: 'bi-sun-fill', dark: 'bi-moon-stars-fill' };

        function applyTheme(theme) {
          const resolved = theme === 'auto'
            ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
            : theme;
          document.documentElement.setAttribute('data-bs-theme', resolved);
          localStorage.setItem('theme', theme);
        }

        function syncIcon() {
          const stored = localStorage.getItem('theme') || 'auto';
          const icon = document.getElementById('theme-icon');
          if (icon) icon.className = 'bi ' + icons[stored];
        }

        document.addEventListener('DOMContentLoaded', function () {
          syncIcon();
          document.getElementById('theme-toggle').addEventListener('click', function () {
            const current = localStorage.getItem('theme') || 'auto';
            const next = themes[(themes.indexOf(current) + 1) % themes.length];
            applyTheme(next);
            syncIcon();
          });
        });
      })();

      // Render career + research
      function renderBio() {
        function fmt(yyyymm) {
          return yyyymm ? yyyymm.slice(0, 4) + '/' + yyyymm.slice(4, 6) : 'Present';
        }
        const careerHtml = CAREER.map(({ from, to, institution, role }) => `
          <li class="d-flex gap-2 align-items-baseline">
            <span class="text-body-tertiary text-nowrap" style="font-size:0.75rem;width:8rem;flex-shrink:0">${fmt(from)} – ${fmt(to)}</span>
            <span class="small">${institution} &middot; ${role}</span>
          </li>`).join('');

        const tagsHtml = RESEARCH.tags.map(({ label, icon }) => `
          <span class="d-inline-flex align-items-center gap-1 text-body-secondary small">
            <i class="bi ${icon} text-primary"></i>${label}
          </span>`).join('');

        document.getElementById('bio-container').innerHTML = `
          <ul class="list-unstyled mb-2 mt-1 d-flex flex-column align-items-start">${careerHtml}</ul>
          <p class="mb-1 small fw-semibold text-body-secondary">Skills</p>
          <div class="d-flex flex-wrap gap-3 justify-content-center justify-content-md-start">${tagsHtml}</div>`;
      }

      // Render links
      function renderLinks() {
        const container = document.getElementById('links-container');
        LINKS.forEach(({ label, icon, url }) => {
          const a = document.createElement('a');
          a.href = url;
          a.className = 'profile-link';
          a.innerHTML = `<i class="bi ${icon}"></i>${label}`;
          if (url !== '#') { a.setAttribute('target', '_blank'); a.setAttribute('rel', 'noopener noreferrer'); }
          container.appendChild(a);
        });
      }

      // Render What's New feed
      function renderWhatsNew() {
        const container = document.getElementById('whatsnew-container');
        WHATSNEW.forEach(({ date, tag, title, body }) => {
          const div = document.createElement('div');
          div.className = 'feed-item';
          div.innerHTML = `
            <div class="d-flex justify-content-between align-items-center mb-1">
              <span class="badge rounded-pill bg-primary" style="font-size:0.7rem">${tag}</span>
              <small class="text-body-tertiary">${date}</small>
            </div>
            <div class="fw-semibold small mb-1">${title}</div>
            <div class="text-body-secondary" style="font-size:0.8rem">${body}</div>`;
          container.appendChild(div);
        });
      }

      renderBio();
      renderLinks();
      renderWhatsNew();
    </script>
  </body>
</html>
