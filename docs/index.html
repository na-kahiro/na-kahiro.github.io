<!doctype html>
<html lang="en" data-bs-theme="auto">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="My homepage" />
    <title>Hiromasa Nakatsuka</title>
    <script>
      (function () {
        const t = localStorage.getItem('theme') || 'auto';
        document.documentElement.setAttribute('data-bs-theme',
          t === 'auto' ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light') : t);
      })();
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/css/style.css?v=2">
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar site-navbar sticky-top">
      <div class="container">
        <ul class="navbar-nav flex-row gap-4 mb-0">
          <li class="nav-item"><a class="nav-link" href="#profile">Profile</a></li>
          <li class="nav-item"><a class="nav-link" href="#whatsnew">What's New</a></li>
        </ul>
        <button id="theme-toggle" class="btn btn-sm rounded-2 p-0 theme-button" aria-label="Toggle theme">
          <i id="theme-icon" class="bi bi-circle-half"></i>
        </button>
      </div>
    </nav>

    <main>
      <!-- Hero / Profile section -->
      <section id="profile" class="hero-section">
        <div class="container">
          <div class="row align-items-center g-4 g-xl-5">
            <div class="col-12 col-lg-7">
              <h1 class="hero-title fw-bold mb-3">Hiromasa Nakatsuka</h1>
              <p class="hero-jp-name fw-bold mb-4">中塚洋佑</p>
              <div class="profile-links" id="links-container"></div>
            </div>
            <div class="col-12 col-lg-5">
              <aside class="hero-profile p-3 p-sm-4" aria-label="Career profile">
                <div class="d-flex align-items-center gap-3 mb-4">
                  <img src="assets/img/profile.png" alt="Profile photo" class="profile-photo">
                  <div>
                    <p class="small text-body-secondary mb-0">Working on LLM applications. Research experience in financial markets and particle cosmology.</p>
                  </div>
                </div>
                <div class="d-flex flex-wrap gap-2 mb-4" id="research-tags-container"></div>
                <div id="career-container"></div>
              </aside>
            </div>
          </div>
        </div>
      </section>

      <!-- What's New section -->
      <section id="whatsnew" class="section-pad">
        <div class="container">
          <div class="row justify-content-center">
            <div class="col-12 col-lg-8 col-xl-7">
              <div class="d-flex align-items-end justify-content-between gap-3 mb-3">
                <h2 class="section-title fw-bold mb-0">What's New</h2>
              </div>
              <div class="feed-list" id="whatsnew-container"></div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="py-3 text-center text-body-secondary border-top small">
      <p class="mb-0">&copy; 2026 Hiromasa Nakatsuka. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/main.js"></script>
  </body>
</html>
